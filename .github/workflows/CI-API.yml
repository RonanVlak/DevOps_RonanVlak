name: Week2 CI - Tests & Coverage

on:
  push:
    branches:
      - main
      - development 
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
         
          cache-dependency-path: 'package-lock.json'

      - name: Install Root dependencies (for Lint)
        run: npm install

      - name: Install Week2 dependencies (for Tests)
        run: cd week2 && npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests & Jest Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: week2
          package-manager: npm
          test-script: npm test
          annotations: none
          output: report-markdown
          threshold: 80
