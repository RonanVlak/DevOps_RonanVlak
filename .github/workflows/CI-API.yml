name: Week2 CI - Tests & Coverage

on:
  push:
    paths:
      - 'week2/**'
  pull_request:
    branches:
      - main
    paths:
      - 'week2/**'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./week2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'week2/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests & Jest Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: week2
          package-manager: npm
          test-script: npm test
          annotations: none
          output: report
          threshold: 80
