name: CI-API

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'week2/**'
  pull_request:
    branches:
      - main
    paths:
      - 'week2/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./week2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'week2/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        working-directory: ./
        run: npm run lint
        continue-on-error: true 

      - name: Run Tests & Jest Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: week2
          package-manager: npm
          test-script: npm test
          annotations: none
          threshold: 80
          # Op main: gebruik 'report-markdown' (geen crash). Op PR: gebruik 'comment'.
          output: ${{ github.ref == 'refs/heads/main' && 'report-markdown' || 'comment' }}
          # Op main: skip de vergelijkingstappen.
          skip-step: ${{ github.ref == 'refs/heads/main' && 'all' || 'none' }}
