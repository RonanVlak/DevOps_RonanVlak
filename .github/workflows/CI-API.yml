name: CI-API

on:
  push:
    branches: [main, development]
    paths:
      - 'week2/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'week2/package-lock.json'

      - name: Install dependencies
        run: |
          npm install
          cd week2 && npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true 

      # ArtiomTr (Alleen bij PR)
      - name: Run Tests & Jest Coverage Report
        if: github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: week2
          package-manager: npm
          test-script: npm test
          threshold: 80

      # Stap 4: Simpele run voor de groene badge op Main
      - name: Run Tests (Main branch fix)
        if: github.event_name != 'pull_request'
        working-directory: ./week2
        run: npm test -- --coverage --ci --watchAll=false
